name: iOS CI

on:
  push:
    branches: [ main, develop ]
  pull_request:
    branches: [ main ]

jobs:
  build-and-test:
    runs-on: macos-15
    scheme: PipelineOnGitHub

    steps:
    - uses: actions/checkout@v4

    - name: Select Xcode
      run: sudo xcode-select -s /Applications/Xcode_16.2.app/Contents/Developer

    - name: Build
      run: |
        xcodebuild build \
          -scheme "${{ env.scheme }}" \
          -destination 'platform=iOS Simulator,name=iPhone 16,OS=18.2' \
          | xcpretty

    - name: Test
      run: |
        xcodebuild test \
          -scheme "${{ env.scheme }}" \
          -destination 'platform=iOS Simulator,name=iPhone 16,OS=18.2' \
          | xcpretty
