name: iOS CI

on:
  push:
    branches: [ main, develop ]
  pull_request:
    branches: [ main ]

permissions:
  contents: read

jobs:
  build-and-test:
    runs-on: macos-14
    env:
      SCHEME: PipelineOnGitHub
      PROJECT: PipelineOnGitHub.xcodeproj

    steps:
    - uses: actions/checkout@v4

    - name: Select Xcode
      uses: maxim-lobanov/setup-xcode@v1
      with:
        xcode-version: '16.1'

    - name: Install iOS Simulator
      run: |
        sudo xcodebuild -downloadPlatform iOS

    - name: SwiftFormat Check
      run: |
        brew install swiftformat
        swiftformat --lint .

    - name: SwiftLint
      run: |
        brew install swiftlint
        swiftlint

    - name: Resolve Swift Packages
      run: |
        xcodebuild -resolvePackageDependencies \
          -scheme "${{ env.SCHEME }}" \
          -project "${{ env.PROJECT }}"

    - name: Build
      run: |
        xcodebuild build \
          -scheme "${{ env.SCHEME }}" \
          -project "${{ env.PROJECT }}" \
          -destination 'generic/platform=iOS Simulator' \
          | xcpretty

    - name: Unit Test
      run: |
        DESTINATION=$(xcrun simctl list devices available | grep "iPhone" | head -1 | sed 's/.*(\([A-Z0-9-]*\)).*/\1/')
        if [ -z "$DESTINATION" ]; then
          echo "No iOS Simulator found - skipping tests"
          exit 0
        fi
        xcodebuild test \
          -scheme "${{ env.SCHEME }}" \
          -project "${{ env.PROJECT }}" \
          -destination "id=$DESTINATION" \
          -enableCodeCoverage YES \
          | xcpretty

    - name: Coverage
      run: |
        bash scripts/coverage.sh

    - name: Xcode Analyze
      run: |
        xcodebuild analyze \
          -scheme "${{ env.SCHEME }}" \
          -project "${{ env.PROJECT }}" \
          -destination 'generic/platform=iOS Simulator' \
          | xcpretty

    - name: Periphery
      run: |
        brew install peripheryapp/periphery/periphery
        periphery scan \
          --project "${{ env.PROJECT }}" \
          --schemes "${{ env.SCHEME }}" \
          --targets "${{ env.SCHEME }}"

    - name: SonarCloud
      uses: sonarsource/sonarqube-scan-action@master
      env:
        SONAR_TOKEN: ${{ secrets.SONAR_TOKEN }}


