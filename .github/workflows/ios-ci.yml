name: iOS CI

on:
  push:
    branches: [ main, develop ]
  pull_request:
    branches: [ main ]

permissions:
  contents: read
  security-events: write

jobs:
  build-and-test:
    runs-on: macos-15
    env:
      SCHEME: PipelineOnGitHub
      PROJECT: PipelineOnGitHub.xcodeproj

    steps:
    - uses: actions/checkout@v4

    - name: Select Xcode
      run: sudo xcode-select -s /Applications/Xcode_16.2.app/Contents/Developer

    - name: Install iOS Simulator
      run: xcodebuild -downloadPlatform iOS

    - name: SwiftFormat Check
      run: |
        brew install swiftformat
        swiftformat --lint .

    - name: SwiftLint
      run: |
        brew install swiftlint
        swiftlint

    - name: Resolve Swift Packages
      run: |
        xcodebuild -resolvePackageDependencies \
          -scheme "${{ env.SCHEME }}" \
          -project "${{ env.PROJECT }}"

    - name: Build
      run: |
        xcodebuild build \
          -scheme "${{ env.SCHEME }}" \
          -project "${{ env.PROJECT }}" \
          -destination 'platform=iOS Simulator,name=iPhone 16,OS=18.2' \
          | xcpretty

    - name: Unit Test
      run: |
        xcodebuild test \
          -scheme "${{ env.SCHEME }}" \
          -project "${{ env.PROJECT }}" \
          -destination 'platform=iOS Simulator,name=iPhone 16,OS=18.2' \
          -enableCodeCoverage YES \
          | xcpretty

    - name: Coverage
      run: |
        bash scripts/coverage.sh

    - name: Xcode Analyze
      run: |
        xcodebuild analyze \
          -scheme "${{ env.SCHEME }}" \
          -project "${{ env.PROJECT }}" \
          -destination 'platform=iOS Simulator,name=iPhone 16,OS=18.2' \
          | xcpretty

    - name: Periphery
      run: |
        brew install peripheryapp/periphery/periphery
        periphery scan \
          --project "${{ env.PROJECT }}" \
          --schemes "${{ env.SCHEME }}" \
          --targets "${{ env.SCHEME }}"

    - name: SonarCloud
      uses: sonarsource/sonarqube-scan-action@master
      env:
        SONAR_TOKEN: ${{ secrets.SONAR_TOKEN }}

    - name: CodeQL Init
      uses: github/codeql-action/init@v3
      with:
        languages: swift

    - name: CodeQL Analyze
      uses: github/codeql-action/analyze@v3
